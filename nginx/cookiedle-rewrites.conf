# Managed by CI (deploy.yml) - edit here, not on the server directly.
# Redirects .html URLs to their clean equivalents.
location = /unlimited.html { return 301 /unlimited; }
location = /secret.html  { return 301 /secret; }
location = /archive.html { return 301 /archive; }

# Serve clean URLs by mapping to the actual .html files.
location = /unlimited { try_files /unlimited.html =404; }
location = /secret    { try_files /secret.html =404; }
location = /archive   { try_files /archive.html =404; }
