<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cookiedle</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #1a1a2e;
    --surface: #16213e;
    --card:    #0f3460;
    --accent:  #e94560;
    --gold:    #f5a623;
    --green:   #4caf50;
    --orange:  #ff9800;
    --red:     #c0392b;
    --text:    #e0e0e0;
    --muted:   #7a8aa0;
    --border:  rgba(255,255,255,0.08);
    --glow:    0 0 20px rgba(233,69,96,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 90%, rgba(245,166,35,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 80% 10%, rgba(233,69,96,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 40px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .logo {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── HOW TO PLAY ── */
  .how-to {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .how-to strong { color: var(--text); }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
  }

  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── GUESS INPUT ── */
  .guess-section { margin-bottom: 28px; }

  .input-wrap {
    position: relative;
    max-width: 480px;
    margin: 0 auto;
  }

  .guess-input {
    width: 100%;
    padding: 14px 120px 14px 20px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .guess-input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .guess-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .guess-input::placeholder { color: var(--muted); font-weight: 600; }

  .submit-btn {
    position: absolute;
    right: 6px; top: 50%;
    transform: translateY(-50%);
    padding: 8px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .submit-btn:hover  { background: #c73650; }
  .submit-btn:active { transform: translateY(-50%) scale(0.96); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Autocomplete */
  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #1e2d4a;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-height: 220px;
    overflow-y: auto;
  }

  .suggestion-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover,
  .suggestion-item.active { background: rgba(233,69,96,0.2); color: #fff; }
  .suggestion-item.used   { opacity: 0.4; text-decoration: line-through; }

  /* ── STATUS BAR ── */
  .already-guessed {
    font-size: 0.75rem;
    color: var(--accent);
    text-align: center;
    margin-top: 6px;
    min-height: 16px;
    font-weight: 700;
  }

  .guess-meta {
    text-align: center;
    margin-top: 6px;
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
    min-height: 18px;
  }

  /* ── TABLE HEADER ── */
  .table-header {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1.2fr 1fr 1fr 1fr;
    gap: 4px;
    padding: 0 0 8px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .col-head {
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-align: center;
    padding: 4px 2px;
  }

  .col-head:first-child { text-align: left; padding-left: 8px; }

  /* ── GUESS ROWS ── */
  .guess-history { display: flex; flex-direction: column; gap: 5px; }

  .guess-row {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1.2fr 1fr 1fr 1fr;
    gap: 4px;
  }

  .cell {
    border-radius: 7px;
    padding: 10px 6px;
    text-align: center;
    font-size: 0.78rem;
    font-weight: 800;
    line-height: 1.25;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: break-word;
    opacity: 0;
    transform: rotateY(90deg);
    transition: transform 0.35s ease, opacity 0.35s ease;
  }

  .cell.revealed {
    opacity: 1;
    transform: rotateY(0deg);
  }

  /* instant = no animation, for restored sessions */
  .cell.instant {
    opacity: 1;
    transform: rotateY(0deg);
    transition: none;
  }

  .cell:first-child {
    text-align: left;
    justify-content: flex-start;
    padding-left: 10px;
    font-size: 0.82rem;
  }

  .cell-name    { background: #1e2d4a; border: 1px solid var(--border); color: var(--text); }
  .cell-correct { background: var(--green);  color: #fff; }
  .cell-partial { background: var(--orange); color: #fff; }
  .cell-wrong   { background: var(--red);    color: #fff; }

  /* ── VICTORY ── */
  .victory {
    display: none;
    text-align: center;
    padding: 36px 24px;
    background: linear-gradient(135deg, #0f3460, #16213e);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 16px;
    margin-top: 32px;
    animation: victoryPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes victoryPop {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .victory.show { display: block; }

  .victory-emoji  { font-size: 3rem; margin-bottom: 8px; }

  .victory-title {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .victory-sub {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .victory-cookie {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
  }

  .victory-skill {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 20px;
  }

  .victory-skill span { color: var(--gold); font-weight: 800; }

  .share-btn {
    display: inline-block;
    padding: 12px 32px;
    background: var(--gold);
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, transform 0.1s;
    margin: 4px;
  }

  .share-btn:hover  { background: #e0941a; }
  .share-btn:active { transform: scale(0.97); }

  .next-timer {
    margin-top: 16px;
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 600;
  }

  .next-timer span { color: var(--gold); font-weight: 800; }

  /* ── HINT ── */
  .hint-section {
    display: none;
    text-align: center;
    margin: 4px auto 20px;
    max-width: 480px;
  }

  .hint-section.show { display: block; }

  .hint-btn {
    padding: 10px 28px;
    background: transparent;
    border: 2px solid var(--gold);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s, transform 0.1s;
  }

  .hint-btn:hover  { background: rgba(245,166,35,0.12); }
  .hint-btn:active { transform: scale(0.97); }
  .hint-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint-picker {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
  }

  .hint-picker.show { display: flex; }

  .hint-choice {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .hint-choice:hover { background: var(--card); border-color: var(--gold); color: var(--gold); }

  .hint-reveal {
    display: none;
    margin-top: 14px;
    padding: 12px 20px;
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.35);
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--gold);
  }

  .hint-reveal.show { display: block; }

  /* ── EASTER EGG ── */
  .easter-egg {
    position: fixed;
    bottom: 20px;
    right: 24px;
    color: rgba(255,255,255,0.12);
    font-size: 0.72rem;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 1px;
    transition: color 0.4s;
    user-select: none;
    z-index: 10;
  }

  .easter-egg:hover { color: rgba(255,255,255,0.45); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2d1f1f;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 700;
    pointer-events: none;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--card); border-radius: 3px; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .table-header, .guess-row {
      grid-template-columns: 1.8fr 1fr 1fr 0.9fr 0.9fr 0.9fr;
    }
    .cell          { font-size: 0.68rem; padding: 8px 4px; min-height: 46px; }
    .col-head      { font-size: 0.6rem; letter-spacing: 0.8px; }
    .cell:first-child { font-size: 0.7rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">Cookiedle</div>
    <div class="subtitle">Cookie Run Kingdom · Guessing Game</div>
  </header>

  <div class="how-to">
    <strong>How to play:</strong> Guess today's Cookie Run Kingdom cookie! Each guess reveals how close you are across 5 traits.
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Correct</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Color swapped (primary ↔ secondary)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Wrong</div>
    </div>
  </div>

  <div class="guess-section">
    <div class="input-wrap">
      <input
        id="guessInput"
        class="guess-input"
        type="text"
        placeholder="Type a cookie name..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="submit-btn" id="submitBtn">Guess</button>
      <div class="suggestions" id="suggestions" style="display:none"></div>
    </div>
    <div class="already-guessed" id="alreadyGuessed"></div>
    <div class="guess-meta" id="guessMeta"></div>
  </div>

  <div class="table-header">
    <div class="col-head">Cookie</div>
    <div class="col-head">Primary</div>
    <div class="col-head">Secondary</div>
    <div class="col-head">Rarity</div>
    <div class="col-head">Type</div>
    <div class="col-head">Position</div>
  </div>

  <div class="guess-history" id="guessHistory"></div>

  <div class="hint-section" id="hintSection">
    <button class="hint-btn" id="hintBtn">💡 Get Hint</button>
    <div class="hint-picker" id="hintPicker">
      <button class="hint-choice" data-trait="primary_color">Primary Color</button>
      <button class="hint-choice" data-trait="secondary_color">Secondary Color</button>
      <button class="hint-choice" data-trait="rarity">Rarity</button>
      <button class="hint-choice" data-trait="type">Type</button>
      <button class="hint-choice" data-trait="position">Position</button>
    </div>
    <div class="hint-reveal" id="hintReveal"></div>
  </div>

  <div class="victory" id="victoryBanner">
    <div class="victory-emoji">🎉</div>
    <div class="victory-title">You got it!</div>
    <div class="victory-sub" id="victoryGuessCount"></div>
    <div class="victory-cookie" id="victoryCookieName"></div>
    <div class="victory-skill" id="victorySkill"></div>
    <button class="share-btn" id="shareBtn">Share Result 📋</button>
    <div class="next-timer" id="nextTimer"></div>
  </div>

</div>

<a class="easter-egg" href="secret.html">psst...</a>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
// WORKER URL
// ─────────────────────────────────────────
const WORKER_URL = 'https://cookiedle-worker.dangel33.workers.dev';

// Cookie list — loaded from worker on init
let COOKIES = [];

// ─────────────────────────────────────────
// SESSION PERSISTENCE via localStorage
// Keyed by date so it resets each new day.
// Stores guesses + results (not the target).
// ─────────────────────────────────────────
const TODAY_KEY = (() => {
  const d = new Date();
  return `cookiedle-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
})();

function loadState() {
  try {
    const raw = localStorage.getItem(TODAY_KEY);
    return raw ? JSON.parse(raw) : { guesses: [], results: {}, won: false, hintUsed: false, hintTrait: null, hintValue: null, victoryData: null };
  } catch { return { guesses: [], results: {}, won: false, hintUsed: false, hintTrait: null, hintValue: null, victoryData: null }; }
}

function saveState() {
  try {
    localStorage.setItem(TODAY_KEY, JSON.stringify({ guesses, results, won, hintUsed, hintTrait, hintValue, victoryData }));
  } catch {}
}

// ─────────────────────────────────────────
// STATE
// results = { [cookieName]: [...traits] }
// stored locally so restoring is instant
// ─────────────────────────────────────────
const saved     = loadState();
let guesses     = saved.guesses     || [];
let results     = saved.results     || {};
let won         = saved.won         || false;
let hintUsed    = saved.hintUsed    || false;
let hintTrait   = saved.hintTrait   || null;
let hintValue   = saved.hintValue   || null;
let victoryData = saved.victoryData || null;
let activeSuggestion = -1;

// ─────────────────────────────────────────
// DOM REFS
// ─────────────────────────────────────────
const input       = document.getElementById('guessInput');
const suggestBox  = document.getElementById('suggestions');
const historyEl   = document.getElementById('guessHistory');
const metaEl      = document.getElementById('guessMeta');
const alreadyEl   = document.getElementById('alreadyGuessed');
const victoryEl   = document.getElementById('victoryBanner');
const vicCountEl  = document.getElementById('victoryGuessCount');
const vicNameEl   = document.getElementById('victoryCookieName');
const vicSkillEl  = document.getElementById('victorySkill');
const submitBtn   = document.getElementById('submitBtn');
const shareBtn    = document.getElementById('shareBtn');
const nextTimerEl = document.getElementById('nextTimer');
const toastEl     = document.getElementById('toast');
const hintSection = document.getElementById('hintSection');
const hintBtn     = document.getElementById('hintBtn');
const hintPicker  = document.getElementById('hintPicker');
const hintReveal  = document.getElementById('hintReveal');

// ─────────────────────────────────────────
// RESTORE SESSION ON PAGE LOAD
// ─────────────────────────────────────────
function restoreSession() {
  guesses.forEach(name => {
    const traitResults = results[name];
    if (traitResults) addGuessRow(name, traitResults, false);
  });
  updateMeta();
  updateHint();
  if (won && victoryData) {
    input.disabled     = true;
    submitBtn.disabled = true;
    showVictory(false);
  }
}

// ─────────────────────────────────────────
// AUTOCOMPLETE — fuzzy matching
// ─────────────────────────────────────────
function fuzzyScore(name, query) {
  const n = name.toLowerCase(), q = query.toLowerCase();
  if (n.startsWith(q)) return 3;
  if (n.includes(q))   return 2;
  let qi = 0;
  for (let i = 0; i < n.length && qi < q.length; i++) {
    if (n[i] === q[qi]) qi++;
  }
  return qi === q.length ? 1 : 0;
}

input.addEventListener('input', () => {
  activeSuggestion = -1;
  const val = input.value.trim();
  alreadyEl.textContent = '';
  if (!val) { hideSuggestions(); return; }

  const scored = COOKIES
    .map(c => ({ name: c.cookie_name, score: fuzzyScore(c.cookie_name, val) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name))
    .slice(0, 8);

  if (!scored.length) { hideSuggestions(); return; }

  suggestBox.innerHTML = '';
  scored.forEach(({ name }) => {
    const div = document.createElement('div');
    div.className = 'suggestion-item' + (guesses.includes(name) ? ' used' : '');
    div.textContent = name;
    div.addEventListener('mousedown', e => { e.preventDefault(); selectSuggestion(name); });
    suggestBox.appendChild(div);
  });
  suggestBox.style.display = 'block';
});

input.addEventListener('keydown', e => {
  const items = suggestBox.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeSuggestion = Math.min(activeSuggestion + 1, items.length - 1);
    updateActiveSuggestion(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeSuggestion = Math.max(activeSuggestion - 1, -1);
    updateActiveSuggestion(items);
  } else if (e.key === 'Enter') {
    if (activeSuggestion >= 0 && items[activeSuggestion]) {
      e.preventDefault();
      selectSuggestion(items[activeSuggestion].textContent);
    } else {
      submitGuess();
    }
  } else if (e.key === 'Escape') {
    hideSuggestions();
  }
});

function updateActiveSuggestion(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === activeSuggestion));
  if (activeSuggestion >= 0) input.value = items[activeSuggestion].textContent;
}

function selectSuggestion(name) {
  input.value = name;
  hideSuggestions();
  input.focus();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) hideSuggestions();
});

function hideSuggestions() {
  suggestBox.style.display = 'none';
  suggestBox.innerHTML = '';
}

// ─────────────────────────────────────────
// GUESS LOGIC — sends to worker, never
// compares against a local target
// ─────────────────────────────────────────
submitBtn.addEventListener('click', submitGuess);

async function submitGuess() {
  if (won) return;
  const raw = input.value.trim();
  if (!raw) return;

  const cookie = COOKIES.find(c => c.cookie_name.toLowerCase() === raw.toLowerCase());
  if (!cookie) {
    showToast('Cookie not found — check your spelling!');
    return;
  }

  if (guesses.includes(cookie.cookie_name)) {
    alreadyEl.textContent = `Already guessed ${cookie.cookie_name}!`;
    return;
  }

  // Disable input while waiting for worker response
  input.disabled     = true;
  submitBtn.disabled = true;
  alreadyEl.textContent = '';

  let data;
  try {
    const res = await fetch(`${WORKER_URL}/guess`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guess: cookie.cookie_name }),
    });
    data = await res.json();
  } catch {
    showToast('Connection error — please try again.');
    input.disabled     = false;
    submitBtn.disabled = false;
    return;
  }

  if (data.error) {
    showToast(data.error);
    input.disabled     = false;
    submitBtn.disabled = false;
    return;
  }

  // Store result traits locally (safe — no target info)
  const traitResults = [
    { value: cookie.cookie_name,     result: 'name' },
    { value: cookie.primary_color,   result: data.primary_color },
    { value: cookie.secondary_color, result: data.secondary_color },
    { value: cookie.rarity,          result: data.rarity },
    { value: cookie.type,            result: data.type },
    { value: cookie.position,        result: data.position },
  ];

  guesses.push(cookie.cookie_name);
  results[cookie.cookie_name] = traitResults;
  input.value = '';
  hideSuggestions();

  addGuessRow(cookie.cookie_name, traitResults, true);
  updateMeta();
  updateHint();

  if (data.correct) {
    won = true;
    victoryData = {
      name:      data.cookie_name,
      skill:     data.skill_name     || '',
      cooldown:  data.skill_cooldown || 0,
    };
    saveState();
    input.disabled     = true;
    submitBtn.disabled = true;
    setTimeout(() => showVictory(true), 6 * 700 + 400);
  } else {
    input.disabled     = false;
    submitBtn.disabled = false;
    saveState();
  }
}

// ─────────────────────────────────────────
// RENDER GUESS ROW
// traitResults = array of {value, result}
// animate=true  → flip tiles one by one
// animate=false → show instantly (restored)
// ─────────────────────────────────────────
function addGuessRow(cookieName, traitResults, animate) {
  const row = document.createElement('div');
  row.className = 'guess-row';

  traitResults.forEach((trait, i) => {
    const cell = document.createElement('div');
    cell.className = `cell cell-${trait.result}`;
    cell.textContent = trait.value;
    if (!animate) {
      cell.classList.add('instant');
    } else {
      setTimeout(() => cell.classList.add('revealed'), i * 700);
    }
    row.appendChild(cell);
  });

  historyEl.prepend(row);
}

// ─────────────────────────────────────────
// HINT SYSTEM — fetches from worker
// Worker returns the trait value without
// revealing anything else about the target
// ─────────────────────────────────────────
const TRAIT_LABELS = {
  primary_color:   'Primary Color',
  secondary_color: 'Secondary Color',
  rarity:          'Rarity',
  type:            'Type',
  position:        'Position',
};

// Wrong guesses = total guesses minus the winning guess (if won)
function wrongCount() {
  return won ? guesses.length - 1 : guesses.length;
}

function updateHint() {
  // Never show hint if game is won
  if (won) {
    hintSection.classList.remove('show');
    return;
  }

  // Show hint section only after 5 wrong guesses
  hintSection.classList.toggle('show', wrongCount() >= 5);

  // If hint already used, show the reveal and hide button/picker
  if (hintUsed && hintTrait && hintValue) {
    hintBtn.style.display = 'none';
    hintPicker.classList.remove('show');
    hintReveal.textContent = `💡 ${TRAIT_LABELS[hintTrait]}: ${hintValue}`;
    hintReveal.classList.add('show');
  } else {
    hintBtn.style.display = '';
    hintBtn.disabled = false;
  }
}

hintBtn.addEventListener('click', () => {
  if (hintUsed) return;
  hintBtn.disabled = true;
  hintPicker.classList.add('show');
});

hintPicker.querySelectorAll('.hint-choice').forEach(btn => {
  btn.addEventListener('click', async () => {
    const trait = btn.dataset.trait;

    // Fetch the hint value from the worker
    let value;
    try {
      const res = await fetch(`${WORKER_URL}/hint?trait=${trait}`);
      const data = await res.json();
      value = data.value;
    } catch {
      showToast('Could not fetch hint — please try again.');
      hintBtn.disabled = false;
      return;
    }

    hintUsed  = true;
    hintTrait = trait;
    hintValue = value;
    saveState();

    hintBtn.style.display = 'none';
    hintPicker.classList.remove('show');
    hintReveal.textContent = `💡 ${TRAIT_LABELS[trait]}: ${value}`;
    hintReveal.classList.add('show');
  });
});

// ─────────────────────────────────────────
// META
// ─────────────────────────────────────────
function updateMeta() {
  if (!guesses.length) { metaEl.textContent = ''; return; }
  metaEl.textContent = guesses.length === 1 ? '1 guess so far' : `${guesses.length} guesses so far`;
}

// ─────────────────────────────────────────
// VICTORY
// ─────────────────────────────────────────
function showVictory(animate) {
  vicCountEl.textContent = guesses.length === 1
    ? 'Got it in just 1 guess!'
    : `Got it in ${guesses.length} guesses!`;
  vicNameEl.textContent = `🍪 ${victoryData.name}`;
  vicSkillEl.innerHTML  = victoryData.skill
    ? `Skill: <span>${victoryData.skill}</span> · Cooldown: <span>${victoryData.cooldown}s</span>`
    : '';

  if (!animate) victoryEl.style.animation = 'none';
  victoryEl.classList.add('show');
  startNextCookieTimer();
}

function startNextCookieTimer() {
  function tick() {
    const now      = new Date();
    const tomorrow = new Date(now);
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(0, 0, 0, 0);
    const diff = tomorrow - now;
    const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
    nextTimerEl.innerHTML = `Next cookie in <span>${h}:${m}:${s}</span>`;
  }
  tick();
  setInterval(tick, 1000);
}

// ─────────────────────────────────────────
// SHARE — uses locally stored results,
// no target data needed
// ─────────────────────────────────────────
shareBtn.addEventListener('click', () => {
  const emojiMap = { name: '⬜', correct: '🟢', partial: '🟡', wrong: '🔴' };
  const lines = guesses.map(name => {
    const traits = results[name] || [];
    return traits.map(t => emojiMap[t.result] || '⬜').join('');
  });
  const text = [
    `Cookiedle 🍪`,
    `${guesses.length} guess${guesses.length !== 1 ? 'es' : ''}`,
    '',
    ...lines,
    '',
    window.location.href,
  ].join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard! 🎉'));
});

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────
// INIT — fetch cookies from worker first,
// then restore session
// ─────────────────────────────────────────
async function init() {
  // Disable input while loading
  input.disabled     = true;
  submitBtn.disabled = true;
  input.placeholder  = 'Loading cookies...';

  try {
    const res = await fetch(`${WORKER_URL}/cookies`);
    COOKIES = await res.json();
  } catch {
    showToast('Could not load cookie list — please refresh.');
    return;
  }

  input.placeholder  = 'Type a cookie name...';
  input.disabled     = false;
  submitBtn.disabled = false;

  restoreSession();
}

init();
</script>
