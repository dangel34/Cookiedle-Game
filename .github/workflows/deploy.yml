name: Deploy Frontend

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy-frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy to web root
        run: rsync -a --delete docs/ /var/www/cookiedle/

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://cookiedle.nappi.work/","https://cookiedle.nappi.work/index.html","https://cookiedle.nappi.work/unlimited.html","https://cookiedle.nappi.work/secret.html","https://cookiedle.nappi.work/shared.js","https://cookiedle.nappi.work/game.js","https://cookiedle.nappi.work/unlimited.js","https://cookiedle.nappi.work/shared.css","https://cookiedle.nappi.work/game.css","https://cookiedle.nappi.work/unlimited.css","https://cookiedle.nappi.work/robots.txt"]}'
