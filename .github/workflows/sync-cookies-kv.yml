name: Sync cookies.json from KV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch cookies from KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/2f9cc0b9cf2448cc889446f4bd8731b8/values/cookies" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq '.' > data/cookies.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/cookies.json && echo "No changes." && exit 0
          git add data/cookies.json
          git commit -m "chore: sync cookies.json from KV [skip ci]"
          git push
